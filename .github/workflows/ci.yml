name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  shell:
    name: Shell validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Check shell syntax
        run: tests/shell-syntax.sh

      - name: Run ShellCheck
        run: |
          shellcheck --severity=error \
            scripts/*.sh \
            boot-image/*.sh \
            boot-image/overlay/auto-deploy.sh \
            boot-image/overlay/usr/local/bin/hw-detect \
            boot-image/overlay/usr/local/bin/wifi-setup

  nix:
    name: Nix flake validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Resolve flake metadata
        run: nix flake metadata ./system/nixos --accept-flake-config

      - name: Evaluate NixOS module configuration
        run: |
          nix eval ./system/nixos#nixosConfigurations.hermes.config.networking.hostName --accept-flake-config
          nix eval ./system/nixos#nixosConfigurations.hermes.config.networking.useDHCP --accept-flake-config
          nix eval ./system/nixos#nixosConfigurations.hermes.config.users.users.hermes-admin.isNormalUser --accept-flake-config
          nix eval --expr '
            let
              flake = builtins.getFlake (toString ./system/nixos);
              pkgs = import flake.inputs.nixpkgs { system = "x86_64-linux"; };
            in builtins.length (import ./system/nixos/agent-extra-packages.nix { inherit pkgs; })
          ' --accept-flake-config --impure
